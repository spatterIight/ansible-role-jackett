---
- name: Verify Jackett systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Jackett service to become active (up to 180s)
      ansible.builtin.systemd:
        name: jackett.service
      register: jackett_service
      until: jackett_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Jackett service is active
      ansible.builtin.assert:
        that: jackett_service.status.ActiveState == 'active'
        fail_msg: "jackett.service not active ({{ jackett_service.status.ActiveState }})"
        success_msg: "jackett.service is active"

    - name: Wait for Jackett HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:9117/UI/Dashboard"
        method: GET
        status_code: [200]
      register: jackett_endpoint
      until: jackett_endpoint.status == 200
      retries: 120
      delay: 5

    - name: Assert Jackett HTTP endpoint responds
      ansible.builtin.assert:
        that: jackett_endpoint.status == 200
        fail_msg: "Jackett did not respond as expected ({{ jackett_endpoint.status | default('no response') }})"
        success_msg: "Jackett responded with {{ jackett_endpoint.status }}"

    - name: Show Jackett systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Jackett systemd: {{ jackett_service.status.ActiveState }}"
          - "Jackett HTTP: {{ jackett_endpoint.status }}"
