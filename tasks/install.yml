---

- name: Ensure Jackett paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ jackett_uid }}"
    group: "{{ jackett_gid }}"
  with_items:
    - "{{ jackett_base_path }}"
    - "{{ jackett_data_path }}"

- name: Ensure Jackett support files created
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ jackett_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ jackett_uid }}"
    group: "{{ jackett_gid }}"
  with_items:
    - env
    - labels
  register: jackett_support_files_result

- name: Ensure Jackett container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ jackett_container_image }}"
    pull: always
  register: jackett_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: jackett_container_image_pull_result_ansible_module is not failed

- name: Ensure Jackett container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ jackett_container_image }}"
  register: jackett_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: jackett_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in jackett_container_image_pull_result_command.stdout"

- name: Ensure Jackett container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ jackett_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: jackett_network_creation_result

- name: Ensure Jackett container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ jackett_container_network }}
  register: jackett_network_creation_result
  changed_when: jackett_network_creation_result.rc == 0
  failed_when: jackett_network_creation_result.rc != 0 and 'already exists' not in jackett_network_creation_result.stderr

- name: Ensure Jackett systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/jackett.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ jackett_identifier }}.service"
    mode: "0644"
  register: jackett_systemd_service_result

- name: Determine whether Jackett needs a restart
  ansible.builtin.set_fact:
    jackett_restart_necessary: >-
      {{
        jackett_support_files_result.changed | default(false)
        or jackett_systemd_service_result.changed | default(false)
        or jackett_container_image_pull_result_ansible_module.changed | default(false)
        or jackett_container_image_pull_result_command.changed | default(false)
      }}
