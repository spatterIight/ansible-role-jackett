---
- name: Check existence of Jackett systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ jackett_identifier }}.service"
  register: jackett_service_stat

- name: Uninstall Jackett systemd services and files
  when: jackett_service_stat.stat.exists | bool
  block:
    - name: Ensure Jackett systemd service is stopped
      ansible.builtin.service:
        name: "{{ jackett_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Jackett systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ jackett_identifier }}.service"
        state: absent

    - name: Ensure Jackett support files do not exist
      ansible.builtin.file:
        path: "{{ jackett_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Jackett local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ jackett_data_path }}"
      register: jackett_data_path_deletion_result
      changed_when: jackett_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Jackett base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ jackett_base_path }}"
      register: jackett_base_path_deletion_result
      changed_when: jackett_base_path_deletion_result.rc == 0
      failed_when: false

- name: Check existence of Jackett local data path
  ansible.builtin.stat:
    path: "{{ jackett_data_path }}"
  register: jackett_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Jackett local data path
  when: jackett_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Jackett instance has been removed, some old data remains in `" + jackett_data_path + "`. Feel free to delete it."
        ]
      }}
